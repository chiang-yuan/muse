#######################################################################################
# Book settings
# See https://jupyterbook.org/customize/config.html

#######################################################################################
title                       : Muse
author                      : Yuan Chiang
copyright                   : "2023–2026"
logo                        : logo.png

# Do NOT force-execute notebooks in CI (avoids needing MP_API_KEY + Packmol)
execute:
  execute_notebooks: "off"

# LaTeX
latex:
  latex_documents:
    targetname: book.tex

# Bibtex
bibtex_bibfiles:
  - references.bib

# Repository info
repository:
  url: https://github.com/chiang-yuan/muse
  path_to_book: docs
  branch: main

# HTML settings
html:
  use_issues_button: true
  use_repository_button: true
  home_page_in_navbar: true
  favicon: ""

# Sphinx extensions for API docs
sphinx:
  extra_extensions:
    - "sphinx.ext.autodoc"
    - "sphinx.ext.autosummary"
    - "sphinx.ext.napoleon"
  config:
    autosummary_generate: true
    autodoc_typehints: description
    napoleon_google_docstring: true
