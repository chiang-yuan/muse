name: Build and Test

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check muse/ tests/

      - name: Check formatting
        run: ruff format --check muse/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran

      - name: Compile and install Packmol
        run: |
          TAG=20.15.1
          wget "https://github.com/m3g/packmol/archive/refs/tags/v$TAG.tar.gz"
          tar -xzf "v$TAG.tar.gz"
          cd packmol-$TAG
          make
          sudo mv packmol /usr/local/bin
          sudo chmod +x /usr/local/bin/packmol

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify Packmol
        run: which packmol

      - name: Run tests
        run: pytest tests/ -v --tb=short
